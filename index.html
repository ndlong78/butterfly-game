<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bướm Bay" />
    <meta name="theme-color" content="#87ceeb" />
    <title>Bướm Bay Mắt Vui</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.svg" sizes="180x180" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
      }

      body {
        overflow: hidden;
        background: #87ceeb;
        overscroll-behavior: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }

      #app {
        width: 100%;
        height: 100dvh;
        position: relative;
      }

      canvas {
        display: block;
        touch-action: manipulation;
      }

      .debug-reset-btn {
        position: fixed;
        right: max(12px, env(safe-area-inset-right));
        top: max(12px, env(safe-area-inset-top));
        z-index: 9999;
        border: 0;
        border-radius: 10px;
        background: rgba(231, 126, 34, 0.92);
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        padding: 8px 10px;
        touch-action: manipulation;
      }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
    ></script>
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"
    ></script>
  </head>
  <body>
    <div id="app">
      <button id="resetCacheBtn" class="debug-reset-btn" type="button">Reset Cache</button>
      <canvas id="gameCanvas"></canvas>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
